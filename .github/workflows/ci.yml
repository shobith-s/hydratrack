name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest httpx
        
    - name: Run backend tests
      env:
        SUPABASE_URL: "https://test.supabase.co"
        SUPABASE_SERVICE_KEY: "test-key"
        SUPABASE_JWT_SECRET: "test-jwt-secret"
        VAPID_PRIVATE_KEY: "test-key"
        VAPID_PUBLIC_KEY: "test-key"
        VAPID_CLAIMS_EMAIL: "test@test.com"
      run: |
        cd backend && pytest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: cd frontend && npm ci --legacy-peer-deps
      
    - name: Run TypeScript compiler
      run: cd frontend && npx tsc -b
      
    - name: Build Vite PWA
      run: cd frontend && npm run build
      
  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # Simple grep for hardcoded secrets, since this is a self-hosted credential-free template
    - name: Scan for hardcoded VAPID keys
      run: |
        if grep -r "y_X" backend/ frontend/; then
          echo "Found hardcoded secrets!"
          exit 1
        fi
