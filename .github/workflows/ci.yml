name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: cd frontend && npm ci --legacy-peer-deps
      
    - name: Run TypeScript compiler
      run: cd frontend && npx tsc -b
      
    - name: Build Vite PWA
      run: cd frontend && npm run build
      
  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # Simple grep for hardcoded secrets, since this is a self-hosted credential-free template
    - name: Scan for hardcoded VAPID keys
      run: |
        if grep -r "y_X" backend/ frontend/; then
          echo "Found hardcoded secrets!"
          exit 1
        fi
